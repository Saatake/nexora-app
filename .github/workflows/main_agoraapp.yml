name: Build and deploy ASP.Net Core app to Azure Web App - agoraapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        # Adicionei os parâmetros extras aqui para ignorar aquele erro de curinga (**/*.cs)
        run: dotnet build backend/backend.csproj --configuration Release /p:EnableDefaultCompileItems=true /p:EnableDefaultEmbeddedResourceItems=false

      - name: dotnet publish
        # Publicando em uma pasta chamada 'publish-output'
        run: dotnet publish backend/backend.csproj -c Release -o ./publish-output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish-output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish-output # Especifica onde baixar
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_41DDED301828401EAEE51E7B576E52B0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_600A5F6CB95840C4B94BE28979690C0A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4DC2DB86D4BA466FB83BE35E4E57DAF2 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'agoraapp'
          slot-name: 'Production'
          package: ./publish-output