<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Simulador de humor interativo que altera cores, texto e imagem conforme o estado emocional do usuário.">
  <meta name="keywords" content="humor, emoções, simulador, interativo, javascript">
  <meta name="author" content="Diego">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Simulador de Humor</title>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <main class="container">
    <h1>Como você está agora?</h1>

    <p id="texto">Escolha um humor abaixo 👇</p>

    <div class="botoes">
      <button data-humor="feliz">😃 Feliz</button>
      <button data-humor="triste">😢 Triste</button>
      <button data-humor="bravo">😡 Bravo</button>
      <button data-humor="neutro">😐 Neutro</button>
      <button data-humor="confiante">😎 Confiante</button>
      <button data-humor="ansioso">😰 Ansioso</button>
      <button data-humor="desmotivado">😔 Desmotivado</button>
      <button data-humor="cansado">😴 Cansado</button>
      <button data-humor="relaxado">🤗 Relaxado</button>
    </div>

    <h2>Histórico diário</h2>
    <div id="historyContainer"></div>

  </main>

  <script src="./script.js"></script>
</body>
</html>
